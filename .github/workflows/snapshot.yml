name: Refresh Executive Summary Snapshot

on:
  # Twice daily, every day — 10:00 UTC (6am EDT / 5am EST) and 22:00 UTC (6pm EDT / 5pm EST)
  schedule:
    - cron: "0 10,22 * * *"
  # Manual run from the Actions tab
  workflow_dispatch:

# Allow the action to push the refreshed snapshot back to main
permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build snapshot
        env:
          SPARK_API_KEY: ${{ secrets.SPARK_API_KEY }}
        run: npx tsx scripts/build-exec-snapshot.ts

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/exec-summary-snapshot.json public/rating-history.json; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git add public/exec-summary-snapshot.json public/rating-history.json
          git commit -m "data: refresh executive summary snapshot ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push origin main
